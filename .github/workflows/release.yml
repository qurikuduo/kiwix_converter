name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Optional release tag in semantic version format, for example v0.1.0
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Fetch release tags
        shell: pwsh
        run: git fetch --force --tags origin

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          function Parse-SemVerTag([string] $tag) {
            if ($tag -match '^v(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)(-(?<suffix>[0-9A-Za-z\.-]+))?$') {
              return [pscustomobject]@{
                Major = [int] $Matches.major
                Minor = [int] $Matches.minor
                Patch = [int] $Matches.patch
                Suffix = $Matches.suffix
              }
            }

            return $null
          }

          $requestedVersion = '${{ inputs.version }}'
          if (-not [string]::IsNullOrWhiteSpace($requestedVersion)) {
            $version = $requestedVersion.Trim()
            $previousTag = git tag --sort=-version:refname |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+(-[0-9A-Za-z\.-]+)?$' -and $_ -ne $version } |
              Select-Object -First 1
          }
          else {
            $headTag = git tag --points-at HEAD |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+(-[0-9A-Za-z\.-]+)?$' } |
              Select-Object -First 1

            if (-not [string]::IsNullOrWhiteSpace($headTag)) {
              $version = $headTag.Trim()
              $previousTag = git tag --sort=-version:refname |
                Where-Object { $_ -match '^v\d+\.\d+\.\d+(-[0-9A-Za-z\.-]+)?$' -and $_ -ne $version } |
                Select-Object -First 1
            }
            else {
              $previousTag = git tag --sort=-version:refname |
                Where-Object { $_ -match '^v\d+\.\d+\.\d+(-[0-9A-Za-z\.-]+)?$' } |
                Select-Object -First 1

              if ([string]::IsNullOrWhiteSpace($previousTag)) {
                $version = 'v0.1.0'
              }
              else {
                $parsed = Parse-SemVerTag $previousTag
                if ($null -eq $parsed) {
                  throw "Unable to parse the latest semantic version tag '$previousTag'."
                }

                $version = 'v{0}.{1}.{2}' -f $parsed.Major, $parsed.Minor, ($parsed.Patch + 1)
              }
            }
          }

          if (-not $version.StartsWith('v')) {
            throw 'Release version must start with v.'
          }

          if ($version -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z\.-]+)?$') {
            throw 'Release version must follow semantic versioning, for example v1.2.3 or v1.2.3-rc.1.'
          }

          $clean = $version.Substring(1)
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "clean=$clean" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "previous=$previousTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/package | Out-Null

          $currentVersion = '${{ steps.version.outputs.version }}'
          $previousTag = '${{ steps.version.outputs.previous }}'

          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $commitLines = git log --pretty=format:'- %s (%h)' --no-merges
            $previousLine = '- Previous version: none (initial release line)'
            $changelogLine = '- Full changelog: initial release'
          }
          else {
            $commitLines = git log "$previousTag..HEAD" --pretty=format:'- %s (%h)' --no-merges
            $previousLine = "- Previous version: $previousTag"
            $changelogLine = "- Full changelog: https://github.com/${{ github.repository }}/compare/$previousTag...$currentVersion"
          }

          if ([string]::IsNullOrWhiteSpace($commitLines)) {
            $commitLines = '- No source changes were detected between the compared revisions.'
          }

          $notes = @(
            '## Summary',
            '',
            "- Release version: $currentVersion",
            $previousLine,
            '',
            '## Included Changes',
            '',
            $commitLines,
            '',
            '## Artifacts',
            '',
            '- Windows package: attached `.zip`',
            '- Integrity check: attached `.sha256`',
            '',
            '## Full Changelog',
            '',
            $changelogLine
          ) -join "`n"

          $notesPath = 'artifacts/package/release-notes.md'
          Set-Content -Path $notesPath -Value $notes -Encoding utf8
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore dependencies
        run: dotnet restore KiwixConverter.sln

      - name: Build solution
        run: dotnet build KiwixConverter.sln --configuration Release --no-restore /p:Version=${{ steps.version.outputs.clean }}

      - name: Publish Windows package
        run: >-
          dotnet publish src/KiwixConverter.WinForms/KiwixConverter.WinForms.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:Version=${{ steps.version.outputs.clean }}
          -o artifacts/publish/win-x64

      - name: Package release artifact
        id: package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/package | Out-Null
          $zipPath = "artifacts/package/KiwixConverter-win-x64-${{ steps.version.outputs.version }}.zip"
          Compress-Archive -Path artifacts/publish/win-x64/* -DestinationPath $zipPath -Force
          $hash = (Get-FileHash -Algorithm SHA256 -Path $zipPath).Hash.ToLowerInvariant()
          "$hash  $(Split-Path -Leaf $zipPath)" | Out-File -FilePath "$zipPath.sha256" -Encoding utf8
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiwix-converter-win-x64-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.zip_path }}.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Kiwix Converter ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.zip_path }}.sha256